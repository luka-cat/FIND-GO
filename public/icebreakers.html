<!DOCTYPE html>
<html lang="ru" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ледоколы | Find&Go</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bs-body-bg); transition: background-color 0.3s ease; }
        .navbar { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); padding: 12px 0; }
        [data-bs-theme="dark"] .navbar { background: rgba(33, 37, 41, 0.95); }
        .navbar-brand { font-weight: 700; font-size: 1.6rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .btn-menu { background: none; border: none; font-size: 1.8rem; color: #667eea; }
        .btn-logout { border: 1px solid var(--bs-border-color); background: var(--bs-secondary-bg); border-radius: 30px; padding: 6px 18px; transition: 0.2s; color: var(--bs-body-color); }
        .btn-logout:hover { background: #fee2e2; border-color: #fecaca; color: #dc2626; }
        
        .offcanvas-header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .offcanvas-body .nav-link { padding: 12px 16px; color: var(--bs-body-color); font-weight: 500; }
        .offcanvas-body .nav-link:hover { background: var(--bs-secondary-bg); border-radius: 12px; }
        .offcanvas-body .nav-link i { margin-right: 12px; width: 24px; }
        .theme-switch { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; }
        .form-check-input:checked { background-color: #667eea; border-color: #667eea; }

        /* Icebreaker Specific Styles */
        .category-card {
            background: var(--bs-card-bg);
            border-radius: 24px;
            padding: 32px 20px;
            margin-bottom: 24px;
            border: 1px solid var(--bs-border-color);
            transition: all 0.3s ease;
            cursor: pointer;
            text-align: center;
            height: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .category-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }
        .category-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            display: inline-block;
            transition: transform 0.3s ease;
        }
        .category-card:hover .category-icon {
            transform: scale(1.1);
        }
        .category-title {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--bs-body-color);
        }
        .hero-section {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 32px;
            padding: 60px 24px;
            color: white;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.2);
        }
        .btn-random {
            background: white;
            color: #764ba2;
            border: none;
            border-radius: 50px;
            padding: 14px 36px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .btn-random:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.15);
            background: #f8f9fa;
        }
        .question-text {
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.4;
            color: var(--bs-body-color);
        }
        .modal-content {
            border-radius: 24px;
            border: none;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }
        .modal-header {
            border-bottom: 1px solid var(--bs-border-color);
            padding: 24px 32px;
            border-radius: 24px 24px 0 0;
        }
        .modal-body {
            padding: 40px 32px;
            text-align: center;
        }
        .modal-footer {
            border-top: none;
            padding: 24px 32px;
            justify-content: center;
            gap: 12px;
        }
        .btn-copy {
            background: var(--bs-secondary-bg);
            border: 1px solid var(--bs-border-color);
            color: var(--bs-body-color);
            border-radius: 50px;
            padding: 10px 24px;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-copy:hover {
            background: var(--bs-border-color);
        }
        .btn-next {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 10px 24px;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(102, 126, 234, 0.3);
        }
    </style>
</head>
<body>

<!-- Боковое меню -->
<div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarMenu">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title"><i class="bi bi-compass-fill"></i> Find&Go</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house-door"></i> Главная</a></li>
            <li class="nav-item"><a class="nav-link" href="/create-event.html"><i class="bi bi-plus-circle"></i> Создать поход</a></li>
            <li class="nav-item"><a class="nav-link" href="/profile.html"><i class="bi bi-person"></i> Профиль</a></li>
            <li class="nav-item"><a class="nav-link" href="/chats.html"><i class="bi bi-chat-dots"></i> Мои чаты</a></li>
            <li class="nav-item"><a class="nav-link fw-bold text-primary" href="/icebreakers.html"><i class="bi bi-snow2"></i> Ледоколы</a></li>
            <hr>
            <li class="nav-item"><div class="theme-switch"><span><i class="bi bi-moon-stars"></i> Тёмная тема</span><div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="darkModeSwitch"></div></div></li>
        </ul>
    </div>
</div>

<!-- Навбар -->
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <button class="btn-menu me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
            <i class="bi bi-list"></i>
        </button>
        <a class="navbar-brand" href="/"><i class="bi bi-compass-fill"></i> Find&Go</a>
        
        <div class="ms-auto d-flex align-items-center gap-2">
            <div id="userProfileLink" style="cursor: pointer; display: flex; align-items: center; gap: 8px;" onclick="window.location.href='/profile.html'">
                <img id="headerAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=default" width="32" height="32" class="rounded-circle" style="object-fit: cover;">
                <span id="userName" class="fw-bold d-none d-md-inline-block" style="color: var(--bs-body-color);"></span>
            </div>
            <button id="logoutBtn" class="btn btn-logout ms-2">Выйти</button>
        </div>
    </div>
</nav>

<div class="container mt-5 pt-5 pb-5">
    
    <div class="hero-section">
        <h1 class="display-5 fw-bold mb-3"><i class="bi bi-snow2"></i> Ледоколы</h1>
        <p class="lead mb-4">Разрядите обстановку и узнайте друг друга лучше. Выберите категорию или доверьтесь случаю!</p>
        <button class="btn btn-random" onclick="showRandomQuestion()">
            <i class="bi bi-shuffle"></i> Случайный вопрос
        </button>
    </div>

    <div class="row g-4" id="categoriesContainer">
        <!-- Категории будут загружены сюда -->
    </div>
</div>

<!-- Модальное окно для вопроса -->
<div class="modal fade" id="questionModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header" id="questionModalHeader">
                <h5 class="modal-title fw-bold" id="questionModalTitle">
                    <i class="bi bi-hash"></i> Вопрос
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p class="question-text" id="questionText">Здесь будет вопрос...</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-copy" onclick="copyCurrentQuestion()">
                    <i class="bi bi-copy"></i> Копировать
                </button>
                <button type="button" class="btn btn-next" id="btnNextQuestion" onclick="showNextQuestion()">
                    <i class="bi bi-arrow-clockwise"></i> Другой вопрос
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Контейнер для тостов -->
<div id="toastContainer" class="position-fixed bottom-0 end-0 p-3" style="z-index: 1100;"></div>

<!-- Скрипт с вопросами -->
<script src="/icebreakers.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // АВТОРИЗАЦИЯ
    const token = localStorage.getItem('token');
    const currentUser = JSON.parse(localStorage.getItem('user') || '{}');
    if (!token) window.location.href = '/login.html';
    
    document.getElementById('userName').innerHTML = currentUser.name || 'Пользователь';
    document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); window.location.href = '/login.html'; });

    const profile = JSON.parse(localStorage.getItem('profile') || '{}');
    const headerAvatar = document.getElementById('headerAvatar');
    if (headerAvatar) {
        headerAvatar.src = profile.avatar || `https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(currentUser.name || 'default')}`;
    }

    // ТЁМНАЯ ТЕМА
    function initDarkMode() {
        const sw = document.getElementById('darkModeSwitch');
        const html = document.documentElement;
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') { html.setAttribute('data-bs-theme', 'dark'); if (sw) sw.checked = true; }
        else { html.setAttribute('data-bs-theme', 'light'); if (sw) sw.checked = false; }
        if (sw) sw.addEventListener('change', e => { 
            html.setAttribute('data-bs-theme', e.target.checked ? 'dark' : 'light'); 
            localStorage.setItem('theme', e.target.checked ? 'dark' : 'light'); 
        });
    }
    initDarkMode();

    // ТОСТЫ
    function showToast(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast align-items-center text-white bg-${type === 'success' ? 'success' : 'danger'} border-0 mb-2`;
        toast.setAttribute('role', 'alert');
        toast.innerHTML = `<div class="d-flex"><div class="toast-body">${message}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>`;
        container.appendChild(toast);
        const bsToast = new bootstrap.Toast(toast, { delay: 3000 });
        bsToast.show();
        toast.addEventListener('hidden.bs.toast', () => toast.remove());
    }

    // ЛОГИКА ЛЕДОКОЛОВ
    let currentCategoryKey = null; // null означает "случайный из всех"
    const modalEl = document.getElementById('questionModal');
    const questionModal = new bootstrap.Modal(modalEl);

    function renderCategories() {
        const container = document.getElementById('categoriesContainer');
        const html = Object.keys(icebreakersData).map(key => {
            const cat = icebreakersData[key];
            return `
                <div class="col-6 col-md-4 col-lg-3">
                    <div class="category-card" onclick="openCategory('${key}')" style="border-top: 4px solid ${cat.color}">
                        <i class="bi ${cat.icon} category-icon" style="color: ${cat.color}"></i>
                        <div class="category-title">${cat.title}</div>
                        <div class="text-muted small mt-2">${cat.questions.length} вопросов</div>
                    </div>
                </div>
            `;
        }).join('');
        container.innerHTML = html;
    }

    function getRandomItem(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function setModalContent(question, categoryTitle, categoryColor) {
        document.getElementById('questionText').textContent = question;
        document.getElementById('questionModalTitle').innerHTML = `<i class="bi bi-hash" style="color: ${categoryColor}"></i> ${categoryTitle}`;
    }

    function openCategory(key) {
        currentCategoryKey = key;
        const cat = icebreakersData[key];
        const question = getRandomItem(cat.questions);
        setModalContent(question, cat.title, cat.color);
        questionModal.show();
    }

    function showRandomQuestion() {
        currentCategoryKey = null;
        generateNextRandom();
        questionModal.show();
    }

    function generateNextRandom() {
        const keys = Object.keys(icebreakersData);
        const randomKey = getRandomItem(keys);
        const cat = icebreakersData[randomKey];
        const question = getRandomItem(cat.questions);
        setModalContent(question, "Случайный: " + cat.title, cat.color);
    }

    function showNextQuestion() {
        if (currentCategoryKey) {
            // Вопрос из выбранной категории
            const cat = icebreakersData[currentCategoryKey];
            const question = getRandomItem(cat.questions);
            setModalContent(question, cat.title, cat.color);
        } else {
            // Абсолютно случайный вопрос
            generateNextRandom();
        }
    }

    function copyCurrentQuestion() {
        const text = document.getElementById('questionText').textContent;
        navigator.clipboard.writeText(text).then(() => {
            showToast('✅ Вопрос скопирован!', 'success');
        }).catch(() => {
            showToast('❌ Ошибка при копировании', 'danger');
        });
    }

    // Инициализация
    renderCategories();

</script>
</body>
</html>
