<!DOCTYPE html>
<html lang="ru" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Мои чаты | Find&Go</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bs-body-bg); transition: background-color 0.3s ease; }
        .navbar { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); padding: 12px 0; }
        [data-bs-theme="dark"] .navbar { background: rgba(33, 37, 41, 0.95); }
        .navbar-brand { font-weight: 700; font-size: 1.6rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .btn-menu { background: none; border: none; font-size: 1.8rem; color: #667eea; }
        .btn-logout { border: 1px solid var(--bs-border-color); background: var(--bs-secondary-bg); border-radius: 30px; padding: 6px 18px; transition: 0.2s; color: var(--bs-body-color); }
        .btn-logout:hover { background: #fee2e2; border-color: #fecaca; color: #dc2626; }
        
        .chat-card {
            background: var(--bs-card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--bs-border-color);
            transition: all 0.3s ease;
            display: block;
            text-decoration: none;
            color: var(--bs-body-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .chat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-color: #667eea;
            color: var(--bs-body-color);
        }
        .chat-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        .chat-title {
            font-weight: 700;
            font-size: 1.15rem;
            margin-bottom: 4px;
        }
        .chat-meta {
            font-size: 0.85rem;
            color: var(--bs-secondary-color);
        }
        
        .offcanvas-header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .offcanvas-body .nav-link { padding: 12px 16px; color: var(--bs-body-color); font-weight: 500; }
        .offcanvas-body .nav-link:hover { background: var(--bs-secondary-bg); border-radius: 12px; }
        .offcanvas-body .nav-link i { margin-right: 12px; width: 24px; }
        .theme-switch { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; }
        .form-check-input:checked { background-color: #667eea; border-color: #667eea; }
    </style>
</head>
<body>

<!-- Боковое меню -->
<div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarMenu">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title"><i class="bi bi-compass-fill"></i> Find&Go</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house-door"></i> Главная</a></li>
            <li class="nav-item"><a class="nav-link" href="/create-event.html"><i class="bi bi-plus-circle"></i> Создать поход</a></li>
            <li class="nav-item"><a class="nav-link" href="/profile.html"><i class="bi bi-person"></i> Профиль</a></li>
            <li class="nav-item"><a class="nav-link fw-bold text-primary" href="/chats.html"><i class="bi bi-chat-dots-fill"></i> Мои чаты</a></li>
            <hr>
            <li class="nav-item"><div class="theme-switch"><span><i class="bi bi-moon-stars"></i> Тёмная тема</span><div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="darkModeSwitch"></div></div></li>
        </ul>
    </div>
</div>

<!-- Навбар -->
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <button class="btn-menu me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
            <i class="bi bi-list"></i>
        </button>
        <a class="navbar-brand" href="/"><i class="bi bi-compass-fill"></i> Find&Go</a>
        
        <div class="ms-auto d-flex align-items-center gap-2">
            <a href="/create-event.html" class="btn btn-sm btn-success d-none d-sm-inline-block">
                <i class="bi bi-plus-circle"></i> Создать поход
            </a>
            <div id="userProfileLink" style="cursor: pointer; display: flex; align-items: center; gap: 8px;" onclick="window.location.href='/profile.html'">
                <img id="headerAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=default" width="32" height="32" class="rounded-circle" style="object-fit: cover;">
                <span id="userName" class="fw-bold d-none d-md-inline-block" style="color: var(--bs-body-color);"></span>
            </div>
            <button id="logoutBtn" class="btn btn-logout ms-2">Выйти</button>
        </div>
    </div>
</nav>

<div class="container mt-5 pt-5 pb-5">
    <div class="d-flex justify-content-between align-items-center mb-4 mt-3">
        <h2><i class="bi bi-chat-dots"></i> Мои чаты</h2>
    </div>

    <div id="chatsListContainer">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3 text-muted">Загрузка чатов...</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // АВТОРИЗАЦИЯ
    const token = localStorage.getItem('token');
    const currentUser = JSON.parse(localStorage.getItem('user') || '{}');
    if (!token) window.location.href = '/login.html';
    
    document.getElementById('userName').innerHTML = currentUser.name || 'Пользователь';
    document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); window.location.href = '/login.html'; });

    const profile = JSON.parse(localStorage.getItem('profile') || '{}');
    const headerAvatar = document.getElementById('headerAvatar');
    if (headerAvatar) {
        headerAvatar.src = profile.avatar || `https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(currentUser.name || 'default')}`;
    }

    // ТЁМНАЯ ТЕМА
    function initDarkMode() {
        const sw = document.getElementById('darkModeSwitch');
        const html = document.documentElement;
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') { html.setAttribute('data-bs-theme', 'dark'); if (sw) sw.checked = true; }
        else { html.setAttribute('data-bs-theme', 'light'); if (sw) sw.checked = false; }
        if (sw) sw.addEventListener('change', e => { 
            html.setAttribute('data-bs-theme', e.target.checked ? 'dark' : 'light'); 
            localStorage.setItem('theme', e.target.checked ? 'dark' : 'light'); 
        });
    }
    initDarkMode();

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ЗАГРУЗКА ЧАТОВ
    async function loadChats() {
        const container = document.getElementById('chatsListContainer');
        
        try {
            // Получаем все активные события
            const res = await fetch('/api/events', { headers: { 'Authorization': `Bearer ${token}` } });
            if (!res.ok) throw new Error('Ошибка загрузки данных');
            const raw = await res.json();
            const events = Array.isArray(raw) ? raw : (raw.events || []);

            // Фильтруем: создатель или участник
            const myChats = events.filter(ev =>
                ev.creatorId === currentUser.id ||
                (ev.participants && ev.participants.includes(currentUser.id))
            );

            if (!myChats.length) {
                container.innerHTML = `
                    <div class="text-center py-5 text-muted bg-white rounded-4 shadow-sm border mt-4" style="background: var(--bs-card-bg) !important;">
                        <i class="bi bi-chat-slash display-1 mb-3 text-secondary"></i>
                        <h4>У вас пока нет активных чатов</h4>
                        <p class="mt-2 mb-4">Присоединитесь к существующему походу или создайте свой, чтобы начать общаться.</p>
                        <a href="/create-event.html" class="btn btn-primary px-4 py-2 rounded-pill"><i class="bi bi-plus-circle"></i> Создать поход</a>
                        <a href="/" class="btn btn-outline-secondary px-4 py-2 rounded-pill ms-2"><i class="bi bi-search"></i> Найти компанию</a>
                    </div>`;
            } else {
                container.innerHTML = myChats.map(ev => {
                    const isCreator = ev.creatorId === currentUser.id;
                    const placeName = escapeHtml(ev.place?.name || 'Место');
                    const dateStr = new Date(ev.datetime).toLocaleString([], {year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'});
                    
                    return `
                        <a href="/chat.html?eventId=${ev.id}" class="chat-card d-flex align-items-center gap-3">
                            <div class="chat-icon">
                                <i class="bi bi-chat-dots"></i>
                            </div>
                            <div class="flex-grow-1">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div class="chat-title">${placeName}</div>
                                    ${isCreator ? '<span class="badge bg-primary rounded-pill">Ваш поход</span>' : '<span class="badge bg-success rounded-pill">Вы участник</span>'}
                                </div>
                                <div class="chat-meta mt-1">
                                    <span><i class="bi bi-calendar-event"></i> ${dateStr}</span>
                                    <span class="ms-3"><i class="bi bi-people"></i> ${ev.participantsCount || 0}/${ev.maxParticipants} участников</span>
                                </div>
                            </div>
                            <i class="bi bi-chevron-right fs-4 text-muted ms-2"></i>
                        </a>
                    `;
                }).join('');
            }
        } catch(e) {
            console.error(e);
            container.innerHTML = `<div class="text-center py-5 text-danger"><i class="bi bi-exclamation-triangle display-4"></i><p class="mt-3">Произошла ошибка при загрузке чатов. Пожалуйста, обновите страницу.</p></div>`;
        }
    }

    loadChats();
</script>
</body>
</html>
